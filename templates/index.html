<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker - Image Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Sidebar for weekly summary -->
    <div class="sidebar">
        <h2>📅 Weekly Summary</h2>
        <div id="weeklyList">
            <div class="no-data">Loading...</div>
        </div>
        <button class="clear-btn" id="clearDataBtn">🗑️ Clear All Data</button>
    </div>

    <!-- Main content area -->
    <div class="main-content">
        <div class="container">
            <h1>🍎 Calorie Tracker</h1>
            <p class="subtitle">Upload a food image to analyze calories</p>

            <div class="daily-stats" id="dailyStats">
                <h2>�� Today's Stats</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number" id="totalCalories">0</div>
                        <div class="stat-label">Total Calories</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="entryCount">0</div>
                        <div class="stat-label">Meals Logged</div>
                    </div>
                </div>
            </div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Click to upload or drag and drop</div>
                <div class="upload-subtext">PNG, JPG, JPEG, GIF, or WEBP</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="preview-container" id="previewContainer">
                <img id="imagePreview" class="image-preview" alt="Preview">
                <button class="btn" id="analyzeBtn">Analyze Image</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your food image...</p>
            </div>

            <div class="result-container" id="resultContainer">
                <div class="result-box" id="resultBox"></div>
                
                <div class="edit-section" id="editSection" style="display: none;">
                    <label class="edit-label">✏️ Wrong food item? Edit and reanalyze:</label>
                    <textarea class="edit-textarea" id="editTextarea" placeholder="Enter the correct food items (e.g., 1 slice of pizza, 1 apple, 1 cup of rice)"></textarea>
                    <div class="btn-group">
                        <button class="btn edit-btn" id="reanalyzeBtn">🔄 Reanalyze</button>
                        <button class="btn reset-btn" id="cancelEditBtn">Cancel</button>
                    </div>
                </div>
                
                <div style="margin-top: 10px;">
                    <button class="btn edit-btn" id="showEditBtn" style="display: none;">✏️ Edit & Correct</button>
                    <button class="btn reset-btn" id="resetBtn">🔄 Analyze Another Image</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
