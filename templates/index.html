<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker - Image Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            width: 300px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        .week-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .week-item:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        .week-item.today {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left-color: #764ba2;
            font-weight: bold;
        }

        .week-date {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .week-calories {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
        }

        .week-meals {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }

        .clear-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 1em;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .no-data {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .daily-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .daily-stats h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            margin-top: 20px;
            display: none;
        }

        .image-preview {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-box {
            background: #f8f9ff;
            border-left: 5px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.05em;
        }

        .error {
            background: #fff0f0;
            border-left-color: #e74c3c;
            color: #c0392b;
        }

        .success {
            color: #2c3e50;
        }

        .reset-btn {
            background: #95a5a6;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #7f8c8d;
        }

        .edit-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .edit-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            display: block;
        }

        .edit-textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1em;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 10px;
        }

        .edit-textarea:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .edit-btn {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }

        .edit-btn:hover {
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        /* Responsive design for mobile */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 300px;
                margin-bottom: 20px;
            }

            .main-content {
                width: 100%;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar for weekly summary -->
    <div class="sidebar">
        <h2>📅 Weekly Summary</h2>
        <div id="weeklyList">
            <div class="no-data">Loading...</div>
        </div>
        <button class="clear-btn" id="clearDataBtn">🗑️ Clear All Data</button>
    </div>

    <!-- Main content area -->
    <div class="main-content">
        <div class="container">
            <h1>🍎 Calorie Tracker</h1>
            <p class="subtitle">Upload a food image to analyze calories</p>

        <div class="daily-stats" id="dailyStats">
            <h2>📊 Today's Stats</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number" id="totalCalories">0</div>
                    <div class="stat-label">Total Calories</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="entryCount">0</div>
                    <div class="stat-label">Meals Logged</div>
                </div>
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-subtext">PNG, JPG, JPEG, GIF, or WEBP</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="imagePreview" class="image-preview" alt="Preview">
            <button class="btn" id="analyzeBtn">Analyze Image</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing your food image...</p>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-box" id="resultBox"></div>
            
            <div class="edit-section" id="editSection" style="display: none;">
                <label class="edit-label">✏️ Wrong food item? Edit and reanalyze:</label>
                <textarea class="edit-textarea" id="editTextarea" placeholder="Enter the correct food items (e.g., 1 slice of pizza, 1 apple, 1 cup of rice)"></textarea>
                <div class="btn-group">
                    <button class="btn edit-btn" id="reanalyzeBtn">🔄 Reanalyze</button>
                    <button class="btn reset-btn" id="cancelEditBtn">Cancel</button>
                </div>
            </div>
            
            <div style="margin-top: 10px;">
                <button class="btn edit-btn" id="showEditBtn" style="display: none;">✏️ Edit & Correct</button>
                <button class="btn reset-btn" id="resetBtn">🔄 Analyze Another Image</button>
            </div>
        </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');
        const resultBox = document.getElementById('resultBox');
        const resetBtn = document.getElementById('resetBtn');
        const showEditBtn = document.getElementById('showEditBtn');
        const editSection = document.getElementById('editSection');
        const editTextarea = document.getElementById('editTextarea');
        const reanalyzeBtn = document.getElementById('reanalyzeBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const clearDataBtn = document.getElementById('clearDataBtn');
        const weeklyList = document.getElementById('weeklyList');

        let selectedFile = null;
        let currentEntryId = null;  // Store the current entry ID

        // Load weekly summary
        async function loadWeeklySummary() {
            try {
                const response = await fetch('/weekly-summary');
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    const today = new Date().toISOString().split('T')[0];
                    const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    
                    weeklyList.innerHTML = data.data.map(day => {
                        const date = new Date(day.date + 'T00:00:00');
                        const dayName = daysOfWeek[date.getDay()];
                        const isToday = day.date === today;
                        
                        return `
                            <div class="week-item ${isToday ? 'today' : ''}">
                                <div class="week-date">${dayName}, ${day.date}</div>
                                <div class="week-calories">${day.total_calories} cal</div>
                                <div class="week-meals">${day.entry_count} meal${day.entry_count !== 1 ? 's' : ''}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    weeklyList.innerHTML = '<div class="no-data">No data yet. Start tracking!</div>';
                }
            } catch (error) {
                console.error('Error loading weekly summary:', error);
                weeklyList.innerHTML = '<div class="no-data">Error loading data</div>';
            }
        }

        // Load daily stats on page load
        async function loadDailyStats() {
            try {
                const response = await fetch('/daily-total');
                const data = await response.json();
                
                if (data.success && data.data) {
                    document.getElementById('totalCalories').textContent = data.data.total_calories || 0;
                    document.getElementById('entryCount').textContent = data.data.entry_count || 0;
                }
            } catch (error) {
                console.error('Error loading daily stats:', error);
            }
        }

        // Clear all data
        clearDataBtn.addEventListener('click', async () => {
            if (!confirm('⚠️ Are you sure you want to clear ALL data? This cannot be undone!')) {
                return;
            }

            try {
                const response = await fetch('/clear-data', {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ All data cleared successfully!');
                    // Reload the page to refresh all data
                    location.reload();
                } else {
                    alert('❌ Error: ' + (data.error || 'Failed to clear data'));
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        // Load stats when page loads
        loadDailyStats();
        loadWeeklySummary();
        loadDailyStats();

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File selection
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                alert('Please select a valid image file');
                return;
            }

            selectedFile = file;
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                uploadArea.style.display = 'none';
                previewContainer.style.display = 'block';
                resultContainer.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // Analyze button
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('image', selectedFile);

            previewContainer.style.display = 'none';
            loading.style.display = 'block';
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                loading.style.display = 'none';
                resultContainer.style.display = 'block';

                if (data.success) {
                    resultBox.className = 'result-box success';
                    
                    // Store the entry ID for future edits
                    currentEntryId = data.entry_id;
                    
                    // Display analysis with calorie info
                    let resultText = data.analysis;
                    resultText += '\n\n━━━━━━━━━━━━━━━━━━━━━━';
                    resultText += `\n🍽️  This Meal: ${data.calories} calories`;
                    resultText += `\n📊 Today's Total: ${data.daily_total} calories`;
                    resultText += `\n📝 Meals Today: ${data.entry_count}`;
                    
                    resultBox.textContent = resultText;
                    
                    // Update daily stats display
                    document.getElementById('totalCalories').textContent = data.daily_total;
                    document.getElementById('entryCount').textContent = data.entry_count;
                    
                    // Refresh weekly summary
                    loadWeeklySummary();
                    
                    // Show edit button
                    showEditBtn.style.display = 'block';
                    editSection.style.display = 'none';
                } else {
                    resultBox.className = 'result-box error';
                    resultBox.textContent = 'Error: ' + (data.error || 'Unknown error occurred');
                    showEditBtn.style.display = 'none';
                }
            } catch (error) {
                loading.style.display = 'none';
                resultContainer.style.display = 'block';
                resultBox.className = 'result-box error';
                resultBox.textContent = 'Error: ' + error.message;
                showEditBtn.style.display = 'none';
            }
        });

        // Show edit section
        showEditBtn.addEventListener('click', () => {
            editSection.style.display = 'block';
            showEditBtn.style.display = 'none';
            editTextarea.value = '';
            editTextarea.focus();
        });

        // Cancel edit
        cancelEditBtn.addEventListener('click', () => {
            editSection.style.display = 'none';
            showEditBtn.style.display = 'block';
            editTextarea.value = '';
        });

        // Reanalyze with corrected items
        reanalyzeBtn.addEventListener('click', async () => {
            const correctedItems = editTextarea.value.trim();
            
            if (!correctedItems) {
                alert('Please enter the corrected food items');
                return;
            }

            if (!currentEntryId) {
                alert('Error: No entry ID found. Please analyze an image first.');
                return;
            }

            editSection.style.display = 'none';
            loading.style.display = 'block';
            resultContainer.style.display = 'none';

            try {
                const response = await fetch('/reanalyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        corrected_items: correctedItems,
                        entry_id: currentEntryId  // Pass the entry ID to update
                    })
                });

                const data = await response.json();
                loading.style.display = 'none';
                resultContainer.style.display = 'block';

                if (data.success) {
                    resultBox.className = 'result-box success';
                    
                    // Keep the same entry ID (it was updated, not created new)
                    currentEntryId = data.entry_id;
                    
                    // Display corrected analysis
                    let resultText = '✅ Corrected Analysis:\n\n' + data.analysis;
                    resultText += '\n\n━━━━━━━━━━━━━━━━━━━━━━';
                    resultText += `\n🍽️  This Meal: ${data.calories} calories`;
                    resultText += `\n📊 Today's Total: ${data.daily_total} calories`;
                    resultText += `\n📝 Meals Today: ${data.entry_count}`;
                    resultText += '\n\n💡 Tip: The meal count stayed the same - we updated your previous entry!';
                    
                    resultBox.textContent = resultText;
                    
                    // Update daily stats display
                    document.getElementById('totalCalories').textContent = data.daily_total;
                    document.getElementById('entryCount').textContent = data.entry_count;
                    
                    // Refresh weekly summary
                    loadWeeklySummary();
                    
                    // Show edit button again (in case user wants to edit again)
                    showEditBtn.style.display = 'block';
                    editSection.style.display = 'none';
                } else {
                    resultBox.className = 'result-box error';
                    resultBox.textContent = 'Error: ' + (data.error || 'Unknown error occurred');
                    showEditBtn.style.display = 'none';
                }
            } catch (error) {
                loading.style.display = 'none';
                resultContainer.style.display = 'block';
                resultBox.className = 'result-box error';
                resultBox.textContent = 'Error: ' + error.message;
                showEditBtn.style.display = 'none';
            }
        });

        // Reset button
        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            currentEntryId = null;  // Clear entry ID
            fileInput.value = '';
            uploadArea.style.display = 'block';
            previewContainer.style.display = 'none';
            resultContainer.style.display = 'none';
            editSection.style.display = 'none';
            showEditBtn.style.display = 'none';
        });
    </script>
</body>
</html>
